name: CodeQL

on:
  push:
    branches: [main, master]
    # Only analyze when something that affects the Swift build changes; docs and
    # translations don't. The weekly schedule still gives a full baseline scan.
    paths-ignore:
      - "**.md"
      - "Assets/lang/**"
      - "scripts/check-translations.py"
      - "scripts/translation-status.py"
      - "scripts/sync-translations.py"
      - ".github/workflows/translations.yml"
      - ".github/workflows/build.yml"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "Assets/lang/**"
      - "scripts/check-translations.py"
      - "scripts/translation-status.py"
      - "scripts/sync-translations.py"
      - ".github/workflows/translations.yml"
      - ".github/workflows/build.yml"
      - "LICENSE"
      - ".gitignore"
  schedule:
    - cron: "30 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
