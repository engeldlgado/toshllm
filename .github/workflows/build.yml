name: Build & Release

on:
  push:
    branches: [main, master]
    # Skip the full macOS build for pushes that can't change the app or the DMG
    # (docs, community translations and their tooling). Release tags (tags: v*)
    # are matched separately and always build; workflow_dispatch is the manual
    # fallback if a release ever needs a build by hand.
    paths-ignore:
      - "**.md"
      - "Assets/lang/**"
      - "scripts/check-translations.py"
      - "scripts/translation-status.py"
      - "scripts/sync-translations.py"
      - ".github/workflows/translations.yml"
      - ".github/workflows/codeql.yml"
      - "LICENSE"
      - ".gitignore"
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ToshLLM (x86_64)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache engine builds
        uses: actions/cache@v5
        with:
          path: vendor
          key: engines-${{ hashFiles('patches/*.patch', 'scripts/build-engines.sh') }}

      - name: Run unit tests
        run: swift test

      - name: Build inference engines (x86_64)
        run: ARCH=x86_64 ./scripts/build-engines.sh

      - name: Build app (x86_64)
        run: TOSH_ARCH=x86_64 ./make-app.sh

      # Optional Developer ID signing + notarization. Runs only when the
      # repository secrets are configured; otherwise releases stay ad-hoc
      # signed and users must approve the app once in System Settings.
      - name: Sign and notarize (if secrets configured)
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "No signing secrets — keeping ad-hoc signature"
            exit 0
          fi
          echo "$CERT_P12" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci tosh.keychain
          security default-keychain -s tosh.keychain
          security unlock-keychain -p ci tosh.keychain
          security import /tmp/cert.p12 -k tosh.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci tosh.keychain
          IDENTITY=$(security find-identity -v -p codesigning tosh.keychain | grep -oE '"Developer ID Application:[^"]+"' | head -1 | tr -d '"')
          codesign --force --options runtime --deep -s "$IDENTITY" dist/ToshLLM.app
          ditto -c -k --keepParent dist/ToshLLM.app /tmp/ToshLLM.zip
          xcrun notarytool submit /tmp/ToshLLM.zip \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" --wait
          xcrun stapler staple dist/ToshLLM.app

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          [[ "$VERSION" == v* ]] || VERSION="dev-${GITHUB_SHA::7}"
          ./scripts/make-dmg.sh "$VERSION"
          (cd dist && shasum -a 256 *.dmg > checksums.txt)
          echo "DMG=$(ls dist/*.dmg)" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ToshLLM-dmg
          path: dist/*.dmg

      # Pull the section for this tag's version out of CHANGELOG.md so the
      # release body shows the human-written notes; generate_release_notes then
      # appends the auto commit/PR list under it.
      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-notes.md
          echo "----- release body -----"; cat release-notes.md

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/checksums.txt
          body_path: release-notes.md
          generate_release_notes: true
