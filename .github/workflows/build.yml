name: Build & Release

on:
  push:
    branches: [main, master]
    # Skip the full macOS build for pushes that can't change the app or the DMG
    # (docs, community translations and their tooling). Release tags (tags: v*)
    # are matched separately and always build; workflow_dispatch is the manual
    # fallback if a release ever needs a build by hand.
    paths-ignore:
      - "**.md"
      - "Assets/lang/**"
      - "scripts/check-translations.py"
      - "scripts/translation-status.py"
      - "scripts/sync-translations.py"
      - ".github/workflows/translations.yml"
      - ".github/workflows/codeql.yml"
      - "LICENSE"
      - ".gitignore"
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Direct pushes to main only run the unit tests — a fast gate. The full app +
  # DMG build for both CPU variants happens once, on the release tag (below), so
  # a version-bump commit and its tag don't compile the app twice on the same SHA.
  test:
    if: github.event_name == 'push' && github.ref_type == 'branch'
    name: Unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - run: swift test

  build:
    # PRs validate a single variant; tags and manual runs build BOTH CPU variants
    # (standard = AVX2, noavx2 = pre-AVX2 legacy) and ship a DMG for each. Branch
    # pushes are handled by the test job above, so build is skipped for them.
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    name: Build ${{ matrix.variant }} (x86_64)
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && fromJSON('["standard","noavx2"]') || fromJSON('["standard"]') }}
    env:
      # The no-AVX2 leg lowers the CPU baseline in build-engines.sh and stamps the
      # bundle (make-app.sh) so the updater keeps it on its own release channel.
      TOSH_NO_AVX2: ${{ matrix.variant == 'noavx2' && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache engine builds
        uses: actions/cache@v5
        with:
          path: vendor
          # Per variant: the two ISA baselines produce different engine binaries.
          key: engines-${{ matrix.variant }}-${{ hashFiles('patches/*.patch', 'scripts/build-engines.sh') }}

      - name: Run unit tests
        if: github.event_name == 'pull_request'
        run: swift test

      - name: Build inference engines (x86_64)
        run: ARCH=x86_64 ./scripts/build-engines.sh

      - name: Build app (x86_64)
        run: TOSH_ARCH=x86_64 ./make-app.sh

      # Optional Developer ID signing + notarization. Runs only when the
      # repository secrets are configured; otherwise releases stay ad-hoc
      # signed and users must approve the app once in System Settings.
      - name: Sign and notarize (if secrets configured)
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "No signing secrets — keeping ad-hoc signature"
            exit 0
          fi
          echo "$CERT_P12" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci tosh.keychain
          security default-keychain -s tosh.keychain
          security unlock-keychain -p ci tosh.keychain
          security import /tmp/cert.p12 -k tosh.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci tosh.keychain
          IDENTITY=$(security find-identity -v -p codesigning tosh.keychain | grep -oE '"Developer ID Application:[^"]+"' | head -1 | tr -d '"')
          codesign --force --options runtime --deep -s "$IDENTITY" dist/ToshLLM.app
          ditto -c -k --keepParent dist/ToshLLM.app /tmp/ToshLLM.zip
          xcrun notarytool submit /tmp/ToshLLM.zip \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" --wait
          xcrun stapler staple dist/ToshLLM.app

      # The DMG is only consumed by releases; packaging + uploading it on every
      # push/PR just burns time and artifact storage. Only tags and manual runs
      # ship a DMG. make-dmg.sh reads the bundle's variant to name it (-noavx2).
      - name: Package DMG
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          [[ "$VERSION" == v* ]] || VERSION="dev-${GITHUB_SHA::7}"
          ./scripts/make-dmg.sh "$VERSION"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: dmg-${{ matrix.variant }}
          path: dist/*.dmg

  # Collect both variants' DMGs and publish one release with both assets, so the
  # updater can pick the matching one per install (AppInfo.isNoAVX2).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    name: Publish release
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built DMGs
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: dmg-*
          merge-multiple: true

      - name: Checksums
        run: (cd dist && shasum -a 256 *.dmg > checksums.txt && cat checksums.txt)

      # Pull the section for this tag's version out of CHANGELOG.md so the
      # release body shows the human-written notes; generate_release_notes then
      # appends the auto commit/PR list under it.
      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section; stamp the Unreleased header before tagging (scripts/release.sh does it)"
            exit 1
          fi
          echo "----- release body -----"; cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/checksums.txt
          body_path: release-notes.md
          generate_release_notes: true
