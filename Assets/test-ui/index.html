<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToshLLM · Web chat</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --accent: #e8556d; --accent2: #58a6ff;
    --user-bubble: #1f2937; --ai-bubble: #161b22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .badge {
    font-size: 11px; padding: 2px 9px; border-radius: 999px;
    background: rgba(232,85,109,.15); color: var(--accent);
    border: 1px solid rgba(232,85,109,.4);
  }
  #model-name { color: var(--accent2); font-size: 12px; }
  header .spacer { flex: 1; }
  #stats { font-size: 12px; color: var(--dim); font-variant-numeric: tabular-nums; }
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    max-width: 900px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }
  .msg .who { font-size: 11px; color: var(--dim); margin-bottom: 3px; }
  .msg .bubble {
    padding: 10px 14px; border-radius: 12px; white-space: pre-wrap;
    word-wrap: break-word; border: 1px solid var(--border);
  }
  .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.ai   .bubble { background: var(--ai-bubble);  border-bottom-left-radius: 4px; }
  .bubble code {
    background: #21262d; padding: 1px 5px; border-radius: 4px;
    font: 13px ui-monospace, "SF Mono", Menlo, monospace;
  }
  .bubble pre {
    background: #21262d; padding: 10px 12px; border-radius: 8px;
    overflow-x: auto; margin: 6px 0; white-space: pre;
  }
  .bubble pre code { background: none; padding: 0; }
  details.think {
    margin-bottom: 8px; font-size: 13px; color: var(--dim);
    border-left: 3px solid var(--border); padding-left: 10px;
  }
  details.think summary { cursor: pointer; user-select: none; color: var(--accent2); }
  .cursor::after { content: "▋"; animation: blink 1s infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }
  footer {
    background: var(--panel); border-top: 1px solid var(--border);
    padding: 12px 18px;
  }
  .controls {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    max-width: 900px; margin: 0 auto 10px;
    font-size: 12px; color: var(--dim);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls input[type=range] { width: 90px; accent-color: var(--accent); }
  .controls input[type=number] {
    width: 70px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px;
  }
  .controls button {
    background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 12px;
  }
  .controls button:hover { color: var(--text); border-color: var(--dim); }
  .input-row { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
  #prompt {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font: inherit; resize: none; min-height: 46px; max-height: 160px;
  }
  #prompt:focus { outline: none; border-color: var(--accent2); }
  #send {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 0 22px; font: 600 14px inherit; cursor: pointer;
  }
  #send:disabled { opacity: .45; cursor: not-allowed; }
  #send.stop { background: #6e2630; }
</style>
</head>
<body>
<header>
  <h1>ToshLLM</h1>
  <span class="badge">Metal</span>
  <span id="model-name"></span>
  <span class="spacer"></span>
  <span id="stats"></span>
</header>

<div id="chat"></div>

<footer>
  <div class="controls">
    <label>Temp <input type="range" id="temp" min="0" max="1.5" step="0.05" value="0.7">
      <span id="temp-val">0.7</span></label>
    <label id="max-tokens-label">Max tokens <input type="number" id="max-tokens" value="1024" min="16" step="64"></label>
    <button id="clear">Clear chat</button>
  </div>
  <div class="input-row">
    <textarea id="prompt"></textarea>
    <button id="send">Send</button>
  </div>
</footer>

<script>
const chatEl   = document.getElementById("chat");
const promptEl = document.getElementById("prompt");
const sendBtn  = document.getElementById("send");
const statsEl  = document.getElementById("stats");
const tempEl   = document.getElementById("temp");

let messages     = [];
let aborter      = null;
let aiName       = "Assistant";
let modelLoaded  = false;

// ── i18n ──────────────────────────────────────────────────────────────
// Spanish and English are built in, like the app. Any other language is loaded
// from lang/<code>.json — the same community overlay files the app ships,
// copied next to this page. The English text is the lookup key, with English as
// the fallback, so a missing or partial translation never shows blank.
// The app passes the chosen language as ?lang=; otherwise we use the browser's.
const EN = {
  maxTokens: "Max tokens", clear: "Clear chat", send: "Send", stop: "Stop",
  placeholder: "Type your message… (Enter sends, Shift+Enter newline)",
  reasoning: "Reasoning", you: "You", assistant: "Assistant",
  connecting: "connecting…", unknownModel: "unknown model",
  serverUnavailable: "server unavailable",
  firstResp: "first resp.", errorRunning: "is llama-server running?",
};
const ES = {
  maxTokens: "Máx. tokens", clear: "Limpiar chat", send: "Enviar", stop: "Detener",
  placeholder: "Escribe tu mensaje… (Enter envía, Shift+Enter salto de línea)",
  reasoning: "Razonamiento", you: "Tú", assistant: "Asistente",
  connecting: "conectando…", unknownModel: "modelo desconocido",
  serverUnavailable: "servidor no disponible",
  firstResp: "primera resp.", errorRunning: "¿está corriendo llama-server?",
};
const params = new URLSearchParams(location.search);
const LANG = (params.get("lang") || navigator.language || "en").slice(0, 2).toLowerCase();
document.documentElement.lang = LANG;

// The app passes the real device name and inference backend in use; show them
// in the badge instead of guessing. Falls back to the static "Metal" label when
// opened directly (no parameters).
const gpu = params.get("gpu");
const backend = params.get("backend");
const badgeEl = document.querySelector(".badge");
if (gpu && backend) badgeEl.textContent = gpu + " · " + backend;
else if (gpu) badgeEl.textContent = gpu;
else if (backend) badgeEl.textContent = backend;

let T = LANG === "es" ? ES : EN;

function applyStrings() {
  document.getElementById("max-tokens-label").firstChild.textContent = T.maxTokens + " ";
  document.getElementById("clear").textContent = T.clear;
  if (!aborter) sendBtn.textContent = T.send;
  promptEl.placeholder = T.placeholder;
  if (!modelLoaded) {
    aiName = T.assistant;
    document.getElementById("model-name").textContent = T.connecting;
  }
}
applyStrings();

// Community language: overlay the English defaults with the fetched file.
if (LANG !== "es" && LANG !== "en") {
  fetch("lang/" + LANG + ".json")
    .then(r => r.ok ? r.json() : {})
    .catch(() => ({}))
    .then(ov => {
      T = Object.fromEntries(Object.entries(EN).map(
        ([k, en]) => [k, (ov[en] && ov[en].trim()) ? ov[en] : en]));
      applyStrings();
    });
}

tempEl.oninput = () => document.getElementById("temp-val").textContent = tempEl.value;

document.getElementById("clear").onclick = () => {
  messages = []; chatEl.innerHTML = ""; statsEl.textContent = "";
};

fetch("/v1/models").then(r => r.json()).then(d => {
  const id = d.data?.[0]?.id || T.unknownModel;
  modelLoaded = true;
  aiName = id.split("/").pop();
  document.getElementById("model-name").textContent = aiName;
}).catch(() => {
  modelLoaded = true;
  document.getElementById("model-name").textContent = T.serverUnavailable;
});

// Minimal render: split <think>, escape HTML and apply bold/code.
function render(el, raw, streaming) {
  let think = null, body = raw;
  const m = raw.match(/^<think>([\s\S]*?)(<\/think>|$)/);
  if (m) { think = m[1].trim(); body = raw.slice(m[0].length); }

  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const md  = s => esc(s)
    .replace(/```(\w*)\n([\s\S]*?)(```|$)/g, (_,l,c) => `<pre><code>${c}</code></pre>`)
    .replace(/`([^`\n]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");

  let html = "";
  if (think) {
    const open = streaming && !raw.includes("</think>") ? " open" : "";
    html += `<details class="think"${open}><summary>${T.reasoning}</summary>${esc(think)}</details>`;
  }
  html += md(body.replace(/^\s+/, ""));
  el.innerHTML = html + (streaming ? '<span class="cursor"></span>' : "");
}

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "ai");
  const who = role === "user" ? T.you : aiName;
  div.innerHTML = `<div class="who"></div><div class="bubble"></div>`;
  div.querySelector(".who").textContent = who;
  const bubble = div.querySelector(".bubble");
  if (text !== undefined) bubble.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

async function send() {
  if (aborter) { aborter.abort(); return; }
  const text = promptEl.value.trim();
  if (!text) return;

  promptEl.value = "";
  addMsg("user", text);
  messages.push({ role: "user", content: text });

  const bubble = addMsg("ai");
  bubble.innerHTML = '<span class="cursor"></span>';

  sendBtn.textContent = T.stop;
  sendBtn.classList.add("stop");
  aborter = new AbortController();

  let full = "", nTokens = 0;
  const t0 = performance.now();
  let tFirst = null;

  try {
    const res = await fetch("/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: aborter.signal,
      body: JSON.stringify({
        messages,
        stream: true,
        temperature: parseFloat(tempEl.value),
        max_tokens: parseInt(document.getElementById("max-tokens").value, 10),
      }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") continue;
        const delta = JSON.parse(payload).choices?.[0]?.delta?.content;
        if (!delta) continue;
        if (tFirst === null) tFirst = performance.now();
        full += delta; nTokens++;
        render(bubble, full, true);
        const dt = (performance.now() - tFirst) / 1000;
        if (dt > 0.3) statsEl.textContent =
          `${nTokens} tokens · ${(nTokens / dt).toFixed(1)} t/s · ${T.firstResp} ${((tFirst - t0) / 1000).toFixed(2)}s`;
        chatEl.scrollTop = chatEl.scrollHeight;
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") full += `\n\n[Error: ${e.message} — ${T.errorRunning}]`;
  }

  render(bubble, full, false);
  // Don't keep the reasoning in history: saves context.
  messages.push({ role: "assistant", content: full.replace(/^<think>[\s\S]*?<\/think>\s*/, "") });
  aborter = null;
  sendBtn.textContent = T.send;
  sendBtn.classList.remove("stop");
  promptEl.focus();
}

sendBtn.onclick = send;
promptEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
promptEl.focus();
</script>
</body>
</html>
